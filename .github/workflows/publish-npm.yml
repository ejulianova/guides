name: Publish to npm

# Manual only — never runs on push or tag creation. npm publish is
# effectively irreversible, so this is a deliberate, explicit action.
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: "npm dist-tag to publish under (latest, next, v1, ...)"
        required: true
        default: "latest"

permissions:
  contents: read
  id-token: write # required for npm provenance AND Trusted Publishing (OIDC auth)

jobs:
  publish:
    runs-on: ubuntu-latest
    # Costs nothing if the "npm-publish" environment isn't configured.
    # Add required reviewers under Settings > Environments for a second
    # manual approval gate on top of the dispatch itself, if wanted later.
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) needs a recent npm CLI - the version bundled
      # with actions/setup-node is often too old to support it.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Record what's about to be published
        run: |
          echo "### Publishing guides@$(node -p "require('./package.json').version")" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm dist-tag: \`${{ inputs.npm-tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

      # Authenticates via npm Trusted Publishing (OIDC) - no token/secret needed.
      # Requires a trusted publisher configured on the package at
      # npmjs.com/package/guides/access, matching this exact repo + workflow file.
      - name: Publish to npm
        run: npm publish --tag ${{ inputs.npm-tag }} --access public --provenance
